<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CRITICAL FIX 3: Mobile View (100dvh) */
        body { 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            background-color: #0f172a; /* Fallback for sidebar area */
        }
        
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark-scroll::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased">

    <div class="flex flex-row flex-grow overflow-hidden w-full">
        
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 hidden md:flex z-20 transition-all duration-300" id="sidebar">
            <div class="p-4 border-b border-slate-700">
                <button id="btn-new-project" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded shadow transition-colors">
                    [+ New Project]
                </button>
            </div>
            
            <div id="project-list" class="flex-grow overflow-y-auto p-3 space-y-1 dark-scroll">
                </div>
            
            <div class="p-4 bg-slate-950 border-t border-slate-800 flex-shrink-0">
                <button id="btn-open-settings" class="flex items-center space-x-2 w-full hover:text-white transition-colors group">
                    <svg class="w-5 h-5 text-slate-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="font-medium">Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-grow flex flex-col bg-white overflow-hidden relative w-full">
            
            <header class="h-14 border-b border-slate-200 bg-slate-50 flex items-center justify-between px-4 flex-shrink-0 z-10">
                <div class="flex items-center space-x-4">
                    <button id="btn-mobile-menu" class="md:hidden text-slate-500 hover:text-slate-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="flex space-x-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-500 shadow-sm border border-red-600"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-400 shadow-sm border border-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500 shadow-sm border border-green-600"></div>
                    </div>
                    <span id="project-title-display" class="hidden sm:inline-block ml-4 text-sm font-semibold text-slate-600 truncate max-w-[150px]">New Project</span>
                </div>
                
                <div class="flex bg-slate-200 p-1 rounded-md">
                    <button id="toggle-preview" class="px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-slate-800 transition-all">Preview</button>
                    <button id="toggle-code" class="px-3 py-1 text-sm font-medium rounded text-slate-600 hover:text-slate-800 transition-all">Code</button>
                </div>
                
                <button id="btn-download" class="text-sm font-medium px-4 py-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded shadow transition-colors flex items-center space-x-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span class="hidden sm:inline">Download</span>
                </button>
            </header>

            <div class="flex-grow relative bg-slate-50 overflow-hidden flex flex-col">
                <iframe id="view-preview" class="w-full h-full border-0 bg-white absolute inset-0 z-10" sandbox="allow-scripts allow-same-origin"></iframe>
                <div id="view-code" class="w-full h-full bg-slate-900 text-green-400 p-6 overflow-auto absolute inset-0 z-0 hidden font-mono text-sm leading-relaxed whitespace-pre-wrap select-text"></div>
                
                <div id="loading-overlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-20 hidden flex-col items-center justify-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                    <p class="text-slate-600 font-medium animate-pulse" id="loading-text">Generating code...</p>
                </div>
            </div>

            <footer class="border-t border-slate-200 bg-white p-3 sm:p-4 flex-shrink-0 z-10 w-full shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <form id="chat-form" class="flex space-x-2 items-end max-w-5xl mx-auto w-full">
                    <div class="flex-grow relative">
                        <textarea id="chat-input" rows="1" class="w-full border border-slate-300 rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none max-h-32 min-h-[48px]" placeholder="Describe the website you want to build... (Shift+Enter for new line)"></textarea>
                    </div>
                    <button type="submit" id="btn-send" class="h-12 px-5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow transition-colors flex items-center justify-center flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </form>
            </footer>

        </main>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">API Settings</h3>
                <button id="btn-close-settings" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">API URL</label>
                    <input type="url" id="setting-url" class="w-full border border-slate-300 rounded-md py-2 px-3 text-sm focus:ring-blue-500 focus:border-blue-500" value="https://openrouter.ai/api/v1/chat/completions">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">API Key</label>
                    <input type="password" id="setting-key" class="w-full border border-slate-300 rounded-md py-2 px-3 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Model ID</label>
                    <input type="text" id="setting-model" class="w-full border border-slate-300 rounded-md py-2 px-3 text-sm focus:ring-blue-500 focus:border-blue-500" value="deepseek/deepseek-r1:free">
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 flex justify-end">
                <button id="btn-save-settings" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-6 rounded shadow transition-colors">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        // --- SYSTEM LOGIC & STATE ---
        const SYSTEM_PROMPT = `You are an expert web developer. Output ONLY raw HTML code representing the complete, functioning webpage. 
Do not include markdown blocks like \`\`\`html. 
Do not include explanations. 
Include inline CSS (Tailwind CDN allowed) and JS if needed. Ensure it is responsive and beautiful.`;

        // Default Config (CRITICAL FIX 1 enforced here)
        const DEFAULT_CONFIG = {
            apiUrl: "https://openrouter.ai/api/v1/chat/completions",
            apiKey: "",
            modelId: "deepseek/deepseek-r1:free"
        };

        let state = {
            config: { ...DEFAULT_CONFIG },
            projects: [],
            currentProjectId: null
        };

        // --- DOM Elements ---
        const DOM = {
            sidebar: document.getElementById('sidebar'),
            projectList: document.getElementById('project-list'),
            btnNewProject: document.getElementById('btn-new-project'),
            btnOpenSettings: document.getElementById('btn-open-settings'),
            btnMobileMenu: document.getElementById('btn-mobile-menu'),
            
            viewPreview: document.getElementById('view-preview'),
            viewCode: document.getElementById('view-code'),
            togglePreview: document.getElementById('toggle-preview'),
            toggleCode: document.getElementById('toggle-code'),
            btnDownload: document.getElementById('btn-download'),
            projectTitleDisplay: document.getElementById('project-title-display'),
            loadingOverlay: document.getElementById('loading-overlay'),
            
            chatForm: document.getElementById('chat-form'),
            chatInput: document.getElementById('chat-input'),
            
            modalSettings: document.getElementById('modal-settings'),
            btnCloseSettings: document.getElementById('btn-close-settings'),
            btnSaveSettings: document.getElementById('btn-save-settings'),
            settingUrl: document.getElementById('setting-url'),
            settingKey: document.getElementById('setting-key'),
            settingModel: document.getElementById('setting-model')
        };

        // --- INITIALIZATION ---
        function init() {
            loadState();
            setupEventListeners();
            
            if (state.projects.length === 0) {
                createNewProject();
            } else {
                if (!state.currentProjectId) state.currentProjectId = state.projects[0].id;
                renderProjectList();
                renderCurrentProject();
            }
            
            // Auto-resize textarea
            DOM.chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
            });
        }

        // --- STORAGE ---
        function loadState() {
            try {
                const savedState = localStorage.getItem('aiBuilderState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    state.config = parsed.config || { ...DEFAULT_CONFIG };
                    state.projects = parsed.projects || [];
                    state.currentProjectId = parsed.currentProjectId || null;
                }
            } catch (e) {
                console.error("Failed to load state", e);
            }
        }

        function saveState() {
            localStorage.setItem('aiBuilderState', JSON.stringify(state));
        }

        // --- PROJECT MANAGEMENT ---
        function createNewProject() {
            const newProject = {
                id: Date.now().toString(),
                name: "New Project",
                messages: [{ role: "system", content: SYSTEM_PROMPT }],
                code: "<div style='display:flex; height:100vh; align-items:center; justify-content:center; font-family:sans-serif; color:#64748b;'><h1>Describe your website below to get started.</h1></div>",
                updatedAt: Date.now()
            };
            state.projects.unshift(newProject);
            state.currentProjectId = newProject.id;
            saveState();
            renderProjectList();
            renderCurrentProject();
            DOM.chatInput.value = '';
            DOM.chatInput.style.height = 'auto';
            if (window.innerWidth < 768) DOM.sidebar.classList.add('hidden'); // auto-hide mobile sidebar
        }

        function getCurrentProject() {
            return state.projects.find(p => p.id === state.currentProjectId);
        }

        function switchProject(id) {
            state.currentProjectId = id;
            saveState();
            renderProjectList();
            renderCurrentProject();
            if (window.innerWidth < 768) DOM.sidebar.classList.add('hidden');
        }

        // --- RENDERING ---
        function renderProjectList() {
            DOM.projectList.innerHTML = '';
            state.projects.forEach(project => {
                const isActive = project.id === state.currentProjectId;
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded text-sm truncate transition-colors ${isActive ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`;
                btn.textContent = project.name;
                btn.onclick = () => switchProject(project.id);
                DOM.projectList.appendChild(btn);
            });
        }

        function renderCurrentProject() {
            const project = getCurrentProject();
            if (!project) return;
            
            DOM.projectTitleDisplay.textContent = project.name;
            
            // Update Iframe
            DOM.viewPreview.srcdoc = project.code;
            
            // Update Code View (Escape HTML)
            DOM.viewCode.textContent = project.code;
        }

        function setViewMode(mode) {
            if (mode === 'preview') {
                DOM.viewPreview.style.zIndex = '10';
                DOM.viewCode.style.zIndex = '0';
                DOM.viewCode.classList.add('hidden');
                
                DOM.togglePreview.classList.replace('bg-transparent', 'bg-white');
                DOM.togglePreview.classList.replace('text-slate-600', 'text-slate-800');
                DOM.togglePreview.classList.add('shadow-sm');
                
                DOM.toggleCode.classList.replace('bg-white', 'bg-transparent');
                DOM.toggleCode.classList.replace('text-slate-800', 'text-slate-600');
                DOM.toggleCode.classList.remove('shadow-sm');
            } else {
                DOM.viewPreview.style.zIndex = '0';
                DOM.viewCode.style.zIndex = '10';
                DOM.viewCode.classList.remove('hidden');
                
                DOM.toggleCode.classList.replace('bg-transparent', 'bg-white');
                DOM.toggleCode.classList.replace('text-slate-600', 'text-slate-800');
                DOM.toggleCode.classList.add('shadow-sm');
                
                DOM.togglePreview.classList.replace('bg-white', 'bg-transparent');
                DOM.togglePreview.classList.replace('text-slate-800', 'text-slate-600');
                DOM.togglePreview.classList.remove('shadow-sm');
            }
        }

        // --- API & CHAT LOGIC ---
        async function handleSend(e) {
            e.preventDefault();
            const prompt = DOM.chatInput.value.trim();
            if (!prompt) return;

            if (!state.config.apiKey) {
                alert("Please configure your API Key in Settings first.");
                openSettings();
                return;
            }

            const project = getCurrentProject();
            if (!project) return;

            // Update UI & Project state
            DOM.chatInput.value = '';
            DOM.chatInput.style.height = 'auto';
            DOM.loadingOverlay.classList.remove('hidden');
            DOM.loadingOverlay.classList.add('flex');
            
            // Update project name on first prompt
            if (project.messages.length === 1) {
                project.name = prompt.substring(0, 30) + (prompt.length > 30 ? "..." : "");
                renderProjectList();
            }

            project.messages.push({ role: "user", content: prompt });

            try {
                // CRITICAL FIX 2: Anti-Crash JSON Logic
                const response = await fetch(state.config.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.config.apiKey}`
                    },
                    body: JSON.stringify({
                        model: state.config.modelId,
                        messages: project.messages
                    })
                });

                // First, await response.text()
                const text = await response.text();

                // If !response.ok, alert text and STOP
                if (!response.ok) {
                    alert("API Error: " + text);
                    DOM.loadingOverlay.classList.add('hidden');
                    DOM.loadingOverlay.classList.remove('flex');
                    project.messages.pop(); // Revert user message on fail
                    return; 
                }

                // Only then JSON.parse(text)
                const data = JSON.parse(text);
                
                let rawOutput = data.choices[0].message.content;
                
                // Clean up markdown wrapper if LLM disobeys prompt
                let cleanHtml = rawOutput;
                const mdMatch = rawOutput.match(/```(?:html)?\s*([\s\S]*?)\s*```/);
                if (mdMatch) {
                    cleanHtml = mdMatch[1];
                }

                project.messages.push({ role: "assistant", content: rawOutput }); // store raw for history
                project.code = cleanHtml;
                project.updatedAt = Date.now();
                
                saveState();
                renderCurrentProject();
                setViewMode('preview'); // Force preview on success

            } catch (error) {
                console.error(error);
                alert("Network or Parse Error: " + error.message);
                project.messages.pop(); // Revert
            } finally {
                DOM.loadingOverlay.classList.add('hidden');
                DOM.loadingOverlay.classList.remove('flex');
            }
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            // Chat
            DOM.chatForm.addEventListener('submit', handleSend);
            DOM.chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend(e);
                }
            });

            // Top Bar
            DOM.togglePreview.addEventListener('click', () => setViewMode('preview'));
            DOM.toggleCode.addEventListener('click', () => setViewMode('code'));
            DOM.btnDownload.addEventListener('click', () => {
                const project = getCurrentProject();
                if (!project) return;
                const blob = new Blob([project.code], { type: "text/html" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${project.name.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'website'}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            });

            // Sidebar & Projects
            DOM.btnNewProject.addEventListener('click', createNewProject);
            DOM.btnMobileMenu.addEventListener('click', () => {
                DOM.sidebar.classList.toggle('hidden');
            });

            // Settings
            DOM.btnOpenSettings.addEventListener('click', openSettings);
            DOM.btnCloseSettings.addEventListener('click', closeSettings);
            DOM.btnSaveSettings.addEventListener('click', saveSettings);
        }

        // --- SETTINGS MODAL LOGIC ---
        function openSettings() {
            DOM.settingUrl.value = state.config.apiUrl;
            DOM.settingKey.value = state.config.apiKey;
            DOM.settingModel.value = state.config.modelId;
            DOM.modalSettings.classList.remove('hidden');
            DOM.modalSettings.classList.add('flex');
        }

        function closeSettings() {
            DOM.modalSettings.classList.add('hidden');
            DOM.modalSettings.classList.remove('flex');
        }

        function saveSettings() {
            state.config.apiUrl = DOM.settingUrl.value.trim() || DEFAULT_CONFIG.apiUrl;
            state.config.apiKey = DOM.settingKey.value.trim();
            state.config.modelId = DOM.settingModel.value.trim() || DEFAULT_CONFIG.modelId;
            saveState();
            closeSettings();
        }

        // Boot
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
