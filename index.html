<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMU AI ULTIMATE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}
header{
padding:10px;
background:#1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}
#chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}
.msg{
margin:6px 0;
padding:8px 12px;
border-radius:10px;
max-width:80%;
}
.user{background:#2563eb;align-self:flex-end;}
.bot{background:#334155;align-self:flex-start;}
footer{
display:flex;
padding:10px;
background:#1e293b;
}
input{
flex:1;
padding:8px;
border-radius:8px;
border:none;
outline:none;
}
button{
margin-left:6px;
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}
#status{
font-size:12px;
opacity:0.7;
}
</style>
</head>
<body>

<header>
<h3>💖 SUMU AI</h3>
<div>
<span id="status">Idle</span>
<button id="settings-btn">⚙️</button>
<button id="clear-btn">🗑</button>
</div>
</header>

<div id="chat-box"></div>

<footer>
<input type="text" id="user-input" placeholder="Say 'Sumu' to activate...">
<button id="send-btn">Send</button>
</footer>

<script>

/* ================= SETTINGS ================= */
const API_URL="https://openrouter.ai/api/v1/chat/completions";
const MODEL="arcee-ai/trinity-large-preview:free";
const WAKE_WORD="sumu";

/* ================= ELEMENTS ================= */
const chatBox=document.getElementById("chat-box");
const input=document.getElementById("user-input");
const sendBtn=document.getElementById("send-btn");
const statusDiv=document.getElementById("status");
const settingsBtn=document.getElementById("settings-btn");
const clearBtn=document.getElementById("clear-btn");

/* ================= API KEY SYSTEM ================= */
let API_KEY=localStorage.getItem("sumu_api_key")||"";

settingsBtn.onclick=()=>{
const key=prompt("Enter your OpenRouter API Key:",API_KEY||"");
if(key){
API_KEY=key;
localStorage.setItem("sumu_api_key",key);
alert("API Key Saved!");
}
};

/* ================= GREETING FUNCTION ================= */
function getGreeting(){

const hour=new Date().getHours();

if(hour>=5 && hour<12){
return "শুভ সকাল ☀️ আজকের দিনটা সুন্দর কাটুক!";
}
else if(hour>=12 && hour<16){
return "শুভ দুপুর 🌤 আশা করি তোমার দিনটা ভালো যাচ্ছে!";
}
else if(hour>=16 && hour<20){
return "শুভ বিকাল 🌇 একটু বিশ্রাম নিতে ভুলো না!";
}
else{
return "শুভ রাত্রি 🌙 আজকের দিনটা শান্তিতে শেষ হোক!";
}

}

/* ================= MEMORY LOAD ================= */
window.onload=()=>{

let history=JSON.parse(localStorage.getItem("sumu_memory"))||[];
history.forEach(msg=>{
addMessage(msg.content,msg.role==="user"?"user":"bot");
});

/* ✅ AUTO GREETING (only if no previous chat) */
if(history.length===0){
const greeting=getGreeting();
addMessage(greeting,"bot");
speak(greeting);
}

startListening();
};

/* ================= SEND MESSAGE ================= */
async function sendMessage(message){

if(!API_KEY){
alert("Please add API Key from ⚙️ Settings");
return;
}

addMessage(message,"user");

let history=JSON.parse(localStorage.getItem("sumu_memory"))||[];
history.push({role:"user",content:message});

const typing=addMessage("Typing...","bot");

try{
const response=await fetch(API_URL,{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:MODEL,
messages:[
{role:"system",content:"You are SUMU AI. Sweet, emotional, intelligent. Reply in same language. Short but meaningful."},
...history
]
})
});

const data=await response.json();
let reply=data.choices?.[0]?.message?.content||"Hmm...";

typing.innerText=reply;

history.push({role:"assistant",content:reply});
localStorage.setItem("sumu_memory",JSON.stringify(history));

speak(reply);

}catch(err){
typing.innerText="Error!";
console.log(err);
}
}

/* ================= UI MESSAGE ================= */
function addMessage(text,type){
const div=document.createElement("div");
div.classList.add("msg",type);
div.innerText=text;
chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
return div;
}

/* ================= VOICE OUTPUT ================= */
function speak(text){

// Emoji remove for clean speech
text=text.replace(/[^\p{L}\p{N}\s.,?!]/gu,'');

const utter=new SpeechSynthesisUtterance(text);

if(/[ঀ-৿]/.test(text)) utter.lang="bn-BD";
else if(/[अ-ह]/.test(text)) utter.lang="hi-IN";
else utter.lang="en-US";

speechSynthesis.cancel();
speechSynthesis.speak(utter);
}

/* ================= WAKE WORD ================= */
let recognition;
let activated=false;

function startListening(){

if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SpeechRecognition();
recognition.continuous=true;
recognition.lang="en-US";

recognition.onresult=(event)=>{
const transcript=event.results[event.results.length-1][0].transcript.toLowerCase();

if(!activated && transcript.includes(WAKE_WORD)){
activated=true;
statusDiv.innerText="Activated";
speak("Yes?");
return;
}

if(activated){
activated=false;
statusDiv.innerText="Listening...";
sendMessage(transcript);
}
};

recognition.onend=()=>{recognition.start();};
recognition.start();
statusDiv.innerText="Background Listening...";
}
}

/* ================= BUTTONS ================= */
sendBtn.onclick=()=>{
if(input.value.trim()!=""){
sendMessage(input.value);
input.value="";
}
};

clearBtn.onclick=()=>{
localStorage.removeItem("sumu_memory");
chatBox.innerHTML="";
};

</script>
</body>
</html>
