<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMU BABY 💖</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html,body{height:100%;margin:0;background:#fdf2f8;}
.app-container{display:flex;flex-direction:column;height:100vh;}
.message-container{flex:1;overflow-y:auto;padding:15px;padding-bottom:100px;}
.input-wrapper{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px;border-top:1px solid #fce7f3;}
.level-badge{font-size:12px;padding:4px 10px;background:#ec4899;color:white;border-radius:999px;}
.bubble-user{background:#ec4899;color:white;padding:10px 14px;border-radius:16px;display:inline-block;}
.bubble-ai{background:white;padding:10px 14px;border-radius:16px;display:inline-block;border:1px solid #fbcfe8;}
</style>
</head>
<body>

<div class="app-container">
<header class="bg-white p-3 shadow flex justify-between items-center">
<div class="flex items-center gap-3">
<h1 class="font-bold text-pink-500">💖 SUMU BABY</h1>
<span id="level-badge" class="level-badge"></span>
</div>
<div class="flex gap-3">
<button id="settings-btn">⚙️</button>
<button id="clear-chat">🗑</button>
</div>
</header>

<div id="messages-container" class="message-container space-y-4"></div>

<div class="input-wrapper">
<form id="chat-form" class="flex gap-2">
<input type="text" id="user-input" placeholder="কি বলবে বেবি..."
class="flex-1 bg-pink-50 rounded-2xl px-4 py-3 outline-none">
<button class="bg-pink-500 text-white px-5 rounded-2xl">➤</button>
</form>
</div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
<div class="bg-white p-6 rounded-2xl w-80 space-y-3">
<h2 class="font-bold text-center text-pink-500">API Settings</h2>

<input type="password" id="openrouter-key"
placeholder="OpenRouter API Key (sk-or-...)"
class="w-full p-3 bg-gray-100 rounded-xl">

<input type="text" id="model-name"
placeholder="Model (deepseek/deepseek-r1:free)"
class="w-full p-3 bg-gray-100 rounded-xl">

<button id="save-settings"
class="w-full bg-pink-500 text-white p-3 rounded-xl">
Save
</button>

</div>
</div>

<script>
const API_URL="https://openrouter.ai/api/v1/chat/completions";

let MODEL=localStorage.getItem("openrouter_model") || "deepseek/deepseek-r1:free";
let OPENROUTER_API=localStorage.getItem("openrouter_key") || "";

let chatHistory=[];
let relationshipLevel=1;
let memory=JSON.parse(localStorage.getItem("sumu_memory"))||{};

/* DOM */
const chatForm=document.getElementById('chat-form');
const userInput=document.getElementById('user-input');
const messagesContainer=document.getElementById('messages-container');
const clearBtn=document.getElementById('clear-chat');
const levelBadge=document.getElementById('level-badge');
const settingsBtn=document.getElementById('settings-btn');
const settingsModal=document.getElementById('settings-modal');
const saveSettings=document.getElementById('save-settings');

/* Load saved */
document.getElementById("openrouter-key").value=OPENROUTER_API;
document.getElementById("model-name").value=MODEL;

/* SETTINGS */
settingsBtn.onclick=()=>settingsModal.classList.remove("hidden");

saveSettings.onclick=()=>{
OPENROUTER_API=document.getElementById("openrouter-key").value.trim();
MODEL=document.getElementById("model-name").value.trim() || "deepseek/deepseek-r1:free";

localStorage.setItem("openrouter_key",OPENROUTER_API);
localStorage.setItem("openrouter_model",MODEL);

settingsModal.classList.add("hidden");
alert("Saved Successfully 💖");
};

/* LEVEL */
function updateLevel(){
const levels=["Crush 💘","Love 💕","Serious 💖","Sad"];
levelBadge.innerText=levels[Math.min(relationshipLevel-1,3)];
}
updateLevel();

/* MEMORY */
function updateMemory(text){
if(text.includes("আমার নাম")){
memory.name=text.split("আমার নাম")[1].trim();
}
localStorage.setItem("sumu_memory",JSON.stringify(memory));
}

function getMemoryPrompt(){
let mem="";
if(memory.name) mem+=`তার প্রেমিকের নাম ${memory.name}।`;
return `এই তথ্য মনে রাখবে। ${mem}`;
}

/* GIRLFRIEND BEHAVIOR */
function getBehaviorPrompt(){
return `
তুমি "Puchu" এর Boyfriend "Sumu" ।
সবসময় বাংলায় ছোট মিষ্টি reply।
AI পরিচয় দেবে না।
`;
}

/* UI */
function addMessage(content,role){
const wrapper=document.createElement('div');
wrapper.className=role==="user"?"text-right":"text-left";
const bubble=document.createElement('div');
bubble.className=role==="user"?"bubble-user":"bubble-ai";
bubble.innerHTML=content;
wrapper.appendChild(bubble);
messagesContainer.appendChild(wrapper);
messagesContainer.scrollTop=messagesContainer.scrollHeight;
return bubble;
}

/* 🔥 IMPROVED VOICE SYSTEM */
function speak(text){
if(!('speechSynthesis' in window)) return;

speechSynthesis.cancel();

let cleanText = text
.replace(/[\u{1F300}-\u{1FAFF}]/gu,'')
.replace(/[^\p{L}\p{N}\s.,!?]/gu,'')
.replace(/\s+/g,' ')
.trim();

if(!cleanText) return;

const utter = new SpeechSynthesisUtterance(cleanText);
utter.lang="bn-BD";

let voices = speechSynthesis.getVoices();
let bnVoice = voices.find(v =>
v.lang.includes("bn") || v.name.toLowerCase().includes("bangla")
);
if(bnVoice) utter.voice = bnVoice;

if(cleanText.match(/ভালোবাসি|মিস করছি|চাই তোমায়/)){
utter.pitch=1.3; utter.rate=0.9;
}
else if(cleanText.match(/রাগ|কেন এমন/)){
utter.pitch=0.9; utter.rate=0.95;
}
else if(cleanText.match(/হাহা|মজা|পাগল/)){
utter.pitch=1.4; utter.rate=1;
}
else{
utter.pitch=1.1; utter.rate=0.95;
}

speechSynthesis.speak(utter);
}

/* SEND */
chatForm.onsubmit=async(e)=>{
e.preventDefault();

const text=userInput.value.trim();
if(!text || !OPENROUTER_API){
alert("API Key বসাও আগে ⚙️");
return;
}

addMessage(text,"user");
userInput.value="";
if(relationshipLevel<4) relationshipLevel++;
updateLevel();
updateMemory(text);

const typing=addMessage("লিখছি বেবি...","assistant");

try{
const response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${OPENROUTER_API}`
},
body:JSON.stringify({
model:MODEL,
messages:[
{role:"system",content:getBehaviorPrompt()},
{role:"system",content:getMemoryPrompt()},
...chatHistory,
{role:"user",content:text}
]
})
});

const data=await response.json();
const reply=data?.choices?.[0]?.message?.content || "কি হল বেবি? 💕";

typing.innerHTML=reply;

chatHistory.push({role:"user",content:text});
chatHistory.push({role:"assistant",content:reply});

speak(reply);

}catch{
typing.innerHTML="নেটওয়ার্ক সমস্যা হয়েছে 😢";
}
};

clearBtn.onclick=()=>{
chatHistory=[];
relationshipLevel=1;
memory={};
localStorage.clear();
updateLevel();
messagesContainer.innerHTML="";
};
</script>

</body>
</html>
