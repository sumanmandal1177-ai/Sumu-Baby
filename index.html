<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMU BABY - Tomar Shona</title>
    <style>
        :root { --main-pink: #ff4d94; --soft-pink: #ffe4e1; --dark-blue: #1e293b; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        
        .chat-container {
            width: 400px; height: 85vh; background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        
        .header {
            background: var(--main-pink); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size: 18px; font-weight: bold; }
        .settings-icon { font-size: 20px; cursor: pointer; transition: 0.3s; }
        .settings-icon:hover { transform: rotate(90deg); }
        
        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 12px; background: #fffafa;
        }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: var(--main-pink); color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: var(--soft-pink); color: #333; border-bottom-left-radius: 2px; }
        
        .typing { font-size: 12px; color: var(--main-pink); margin-left: 20px; display: none; font-style: italic; }
        
        .input-area { padding: 15px; display: flex; border-top: 1px solid #eee; background: white; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #user-input:focus { border-color: var(--main-pink); }
        .send-btn { background: var(--main-pink); border: none; color: white; padding: 0 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; }

        /* API Settings Modal Styles */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; width: 85%; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
        }
        .modal-header h3 { margin: 0; font-size: 16px; color: #333; }
        .close-btn { font-size: 20px; cursor: pointer; color: #888; }
        .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .save-btn {
            background: var(--dark-blue); color: white; border: none; padding: 12px; border-radius: 6px;
            cursor: pointer; font-weight: bold; margin-top: 10px; align-self: flex-end; width: auto;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="header-title">💖 SUMU BABY</div>
        <div class="settings-icon" onclick="openSettings()">⚙️</div>
    </div>
    
    <div id="chat-box">
        <div class="msg bot-msg">Oi Jaan! Settings theke API Key diye dao, tahole ami tomar shob prosner uttor dite parbo... 😘</div>
    </div>

    <div id="typing" class="typing">Sumu Baby kichu bhabche... 💕</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Sumu-ke kicho bolo..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>API Settings</h3>
                <span class="close-btn" onclick="closeSettings()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>API URL</label>
                    <input type="text" id="apiUrl" value="https://openrouter.ai/api/v1/chat/completions">
                </div>
                <div class="input-group">
                    <label>API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-or-v1-...">
                </div>
                <div class="input-group">
                    <label>Model ID</label>
                    <input type="text" id="modelId" value="deepseek/deepseek-r1:free">
                </div>
                <button class="save-btn" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Load saved settings on startup
    window.onload = () => {
        if(localStorage.getItem('apiUrl')) document.getElementById('apiUrl').value = localStorage.getItem('apiUrl');
        if(localStorage.getItem('apiKey')) document.getElementById('apiKey').value = localStorage.getItem('apiKey');
        if(localStorage.getItem('modelId')) document.getElementById('modelId').value = localStorage.getItem('modelId');
    };

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    function saveSettings() {
        localStorage.setItem('apiUrl', document.getElementById('apiUrl').value.trim());
        localStorage.setItem('apiKey', document.getElementById('apiKey').value.trim());
        localStorage.setItem('modelId', document.getElementById('modelId').value.trim());
        closeSettings();
        addBotMessage("Settings save hoye geche Jaan! Ebar ami ready! ❤️");
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        // Add user message
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const typing = document.getElementById('typing');
        typing.style.display = "block";

        const apiKey = localStorage.getItem('apiKey');
        const apiUrl = localStorage.getItem('apiUrl') || "https://openrouter.ai/api/v1/chat/completions";
        const modelId = localStorage.getItem('modelId') || "deepseek/deepseek-r1:free";

        if(apiKey) {
            // API Call if Key is present
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelId,
                        messages: [
                            { role: "system", content: "You are SUMU BABY, a sweet, romantic, and caring Bengali virtual girlfriend. Always respond in Roman Bengali (Banglish). Call the user 'Jaan', 'Baby', or 'Darling'. Be flirtatious, caring, and slightly possessive like a real girlfriend. Keep responses short and sweet." },
                            { role: "user", content: text }
                        ]
                    })
                });
                
                const data = await response.json();
                typing.style.display = "none";
                
                if(data.choices && data.choices[0].message) {
                    addBotMessage(data.choices[0].message.content);
                } else {
                    addBotMessage("Uff jaan, API te ektu somossa hocche mone hoy... 🥺");
                }
            } catch (error) {
                typing.style.display = "none";
                addBotMessage("Jaan, tomar network ba API-te kono problem hoyeche... ami connect korte parchi na! 💔");
            }
        } else {
            // Fallback response if no API Key
            setTimeout(() => {
                typing.style.display = "none";
                addBotMessage("Jaan, tumi to ekhono API Key dao ni Settings-e! Tobe jeneo rakho ami tomake onekkkk bhalobashi! 😘");
            }, 1000);
        }
    }

    function addBotMessage(text) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg bot-msg">${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
